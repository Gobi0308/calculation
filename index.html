<html>
<head>
	<title>calculation</title>
</head>
<body>
	<h1>Addition</h1>
	<input type="First No" id="first no" placeholder="Enter First No"></br></br>
	<input type="Second No" id="second no" placeholder="Enter second No"></br></br>
	<input type="Result" id="result" placeholder="Result"></br></br>
	<button onclick="addnumbers()">Add</button>


	<script>
		function addnumbers(){	
			var firstno = document.getElementById("first no").value;
			var secondno = document.getElementById("second no").value;
			var total = parseInt(firstno) + parseInt(secondno);
			document.getElementById("result").value=total;
		}
	</script>
 
</body>
</html>
